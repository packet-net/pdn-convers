# pdn-app.yaml — the pdn-convers app package manifest (packet.net docs/app-packages.md).
#
# This manifest is authored by the app (this repo) and ships alongside the published self-contained
# binary; pdn discovers it under /usr/share/packetnet/apps/convers (or /var/lib/packetnet/apps/convers
# for an owner-installed copy) and never special-cases the app id. The node is reached through public
# interfaces only: RHPv2 for the packet plane, the app-gateway identity contract for the web tile.
#
# FIRST-RUN CONFIG — read before enabling: on first start pdn-convers writes a commented default
# convers.yaml into its state dir (/var/lib/packetnet/apps/convers) and keeps running with the N0CALL
# placeholder callsign. Edit convers.yaml — at minimum `callsign:` (the callsign the node binds over
# RHPv2), `sysop:`, and `defaultChannel:` (3333 is a placeholder); leave the `uplink:` block unset
# until a parent convers node is arranged (HANDOVER.md §4) — then disable/enable (or restart) the app.
# PDN_RHP_HOST/PDN_RHP_PORT come from the supervisor environment; convers.db lives in the same state
# dir. The web port below MUST match `web.port` in convers.yaml.
manifest: 1
id: convers                   # must equal the package directory name
name: Convers
version: "0.1.0"
description: Round-table packet chat — a leaf node on the worldwide convers network, for RF and web users.
icon: chat
capabilities: [network, web]  # binds its own callsign over RHPv2; serves its own web UI

# The .NET daemon pdn supervises while the app is enabled. No `session:` block — convers is not a
# console verb; users connect to its bound callsign over RF, and the node owner uses the web tile.
service:
  command: ./pdn-convers      # relative — resolves to the published binary in this package dir
  environment: {}             # PDN_APP_STATE / PDN_RHP_HOST / PDN_RHP_PORT come from the supervisor

# pdn reverse-proxies /apps/convers/ to the loopback upstream and shows a launcher tile.
ui:
  upstream: http://127.0.0.1:18091   # MUST match web.port in convers.yaml
  name: Convers
  icon: chat
