#
# conversd.conf for the pdn-convers interop ORACLE (saupp-1.62a).
#
# A throwaway, wide-open conversd standing in as the upstream parent node for the interop lane. It
# is reachable only on the loopback-published host port (docker/compose.oracle.yml), so the liberal
# Access rules below are safe for a test oracle — do NOT copy this onto the live network.
#

# Log to stderr so `docker compose logs` shows conversd activity (no syslogd in the container).
Log		critical error auth routing info config link
LogDest		stderr

# Server's convers hostname (NOT a domain name!), max 9 characters.
Server		ORACLE

# Use GMT for radio.
Timezone	GMT

# TCP port to listen on — the convers default.
Port		3600

# Default channel: match pdn-convers' placeholder so a connecting user lands where the app puts them.
DefaultChan	3333

# Operator email + sysinfo are REQUIRED entries (conversd exits without them).
Email		oracle@pdn-convers.invalid
Sysinfo		"pdn-convers interop oracle - conversd-saupp stand-in parent node. Not a real server."

# Sysop login disabled (no operator needed for the oracle).
SecretNum	0

# Be permissive about callsigns so interop tests can /name with arbitrary test calls.
CallValidate	0

#
# Access control. First match applies. This oracle accepts BOTH user and host (peer) connections
# from anywhere it is reachable — pdn-convers links in as a HOST, and interop tests connect as USERs.
#
Access		127.0.0.1	USER HOST
Access		0.0.0.0/0	USER HOST
