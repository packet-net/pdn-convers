name: publish-convers

# Builds the pdn-convers app-package Debian packages (amd64 / arm64 / armhf) and attaches them to a
# GitHub Release. Triggered by `v*` tags (or a manual dispatch with an explicit version).
#
# Self-hosted x64 only (no GitHub-hosted runners — this repo has no hosted-runner budget, matching
# the node). The arm builds cross-publish from x64 (plain self-contained, NO ReadyToRun/crossgen2 —
# it OOMs on cross-publish on the RAM-capped runner and the cold-start gain is marginal), so no
# arch-native runners or cross C-toolchain are needed; scripts/build-deb.sh does the publish +
# packaging.
#
# Single job, no Actions artifacts: the .debs are built and attached to the Release all from one
# job's local working tree — they never touch the Actions artifact store.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the v prefix, e.g. 0.1.0'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # dotnet is pre-installed on the self-hosted runners; setup-dotnet@v4 fails on them ("mkdir:
      # Permission denied" — it can't write its install dir as the runner user). Use the runner's SDK.
      - name: dotnet version
        run: dotnet --version

      - id: v
        name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .debs (amd64 / arm64 / armhf)
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          for rid in linux-x64 linux-arm64 linux-arm; do
            scripts/build-deb.sh "$rid" "$VERSION"
          done

      - name: Checksum + create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          ( cd artifacts && sha256sum pdn-convers_*.deb > SHA256SUMS && ls -l pdn-convers_*.deb SHA256SUMS )
          gh release create "v${VERSION}" artifacts/pdn-convers_*.deb artifacts/SHA256SUMS \
            --repo "${{ github.repository }}" \
            --title "pdn-convers v${VERSION}" \
            --notes "Round-table packet-chat (convers) app package for the Packet.NET node (pdn) ${VERSION} — self-contained \`.deb\`s for amd64 / arm64 / armhf. Install on a box that already runs the packetnet node host: \`sudo apt install ./pdn-convers_${VERSION}_<arch>.deb\` (no .NET runtime required); the app lands under /usr/share/packetnet/apps/convers and you enable it from the node control panel. State (convers.db, convers.yaml) lives in /var/lib/packetnet/apps/convers and is preserved across upgrades."
